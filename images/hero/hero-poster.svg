<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 400" width="1500" height="400">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003865"/>
      <stop offset="60%" stop-color="#1a4f7a"/>
      <stop offset="100%" stop-color="#4D738A"/>
    </linearGradient>
    <linearGradient id="buildGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#002040"/>
      <stop offset="100%" stop-color="#003865"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1500" height="400" fill="url(#skyGrad)"/>
  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#4D738A" stroke-width="1">
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="1400" y1="0" x2="1400" y2="400"/>
  </g>
  <!-- City skyline -->
  <g fill="url(#buildGrad)" opacity="0.7">
    <!-- Far buildings -->
    <rect x="80" y="240" width="40" height="160" rx="1"/>
    <rect x="130" y="210" width="50" height="190" rx="1"/>
    <rect x="200" y="250" width="35" height="150" rx="1"/>
    <rect x="260" y="200" width="55" height="200" rx="1"/>
    <rect x="340" y="230" width="45" height="170" rx="1"/>
    <rect x="410" y="190" width="60" height="210" rx="1"/>
    <rect x="500" y="220" width="40" height="180" rx="1"/>
    <rect x="560" y="180" width="70" height="220" rx="1"/>
    <rect x="650" y="210" width="45" height="190" rx="1"/>
    <rect x="720" y="170" width="65" height="230" rx="1"/>
    <rect x="810" y="195" width="50" height="205" rx="1"/>
    <rect x="880" y="215" width="55" height="185" rx="1"/>
    <rect x="960" y="185" width="60" height="215" rx="1"/>
    <rect x="1040" y="225" width="45" height="175" rx="1"/>
    <rect x="1100" y="200" width="55" height="200" rx="1"/>
    <rect x="1180" y="235" width="40" height="165" rx="1"/>
    <rect x="1240" y="195" width="65" height="205" rx="1"/>
    <rect x="1330" y="220" width="50" height="180" rx="1"/>
    <rect x="1400" y="240" width="45" height="160" rx="1"/>
  </g>
  <!-- Building windows (lights) -->
  <g fill="#4D738A" opacity="0.3">
    <rect x="140" y="225" width="8" height="4"/>
    <rect x="155" y="225" width="8" height="4"/>
    <rect x="140" y="240" width="8" height="4"/>
    <rect x="155" y="240" width="8" height="4"/>
    <rect x="275" y="215" width="8" height="4"/>
    <rect x="290" y="215" width="8" height="4"/>
    <rect x="275" y="230" width="8" height="4"/>
    <rect x="290" y="230" width="8" height="4"/>
    <rect x="275" y="245" width="8" height="4"/>
    <rect x="425" y="205" width="8" height="4"/>
    <rect x="445" y="205" width="8" height="4"/>
    <rect x="425" y="220" width="8" height="4"/>
    <rect x="445" y="220" width="8" height="4"/>
    <rect x="575" y="195" width="8" height="4"/>
    <rect x="595" y="195" width="8" height="4"/>
    <rect x="575" y="210" width="8" height="4"/>
    <rect x="595" y="210" width="8" height="4"/>
    <rect x="735" y="185" width="8" height="4"/>
    <rect x="755" y="185" width="8" height="4"/>
    <rect x="735" y="200" width="8" height="4"/>
    <rect x="755" y="200" width="8" height="4"/>
    <rect x="975" y="200" width="8" height="4"/>
    <rect x="995" y="200" width="8" height="4"/>
    <rect x="975" y="215" width="8" height="4"/>
    <rect x="1115" y="215" width="8" height="4"/>
    <rect x="1135" y="215" width="8" height="4"/>
    <rect x="1115" y="230" width="8" height="4"/>
    <rect x="1255" y="210" width="8" height="4"/>
    <rect x="1275" y="210" width="8" height="4"/>
    <rect x="1255" y="225" width="8" height="4"/>
  </g>
  <!-- Network nodes -->
  <g filter="url(#glow)">
    <circle cx="180" cy="180" r="5" fill="#4D738A" opacity="0.9"/>
    <circle cx="350" cy="140" r="6" fill="#4D738A" opacity="0.9"/>
    <circle cx="520" cy="160" r="5" fill="#4D738A" opacity="0.9"/>
    <circle cx="680" cy="120" r="7" fill="#4D738A" opacity="0.9"/>
    <circle cx="750" cy="100" r="8" fill="#DF3127" opacity="0.8"/>
    <circle cx="850" cy="150" r="5" fill="#4D738A" opacity="0.9"/>
    <circle cx="1000" cy="130" r="6" fill="#4D738A" opacity="0.9"/>
    <circle cx="1150" cy="155" r="5" fill="#4D738A" opacity="0.9"/>
    <circle cx="1320" cy="140" r="6" fill="#4D738A" opacity="0.9"/>
  </g>
  <!-- Connection lines -->
  <g stroke="#4D738A" stroke-width="1" opacity="0.4" fill="none">
    <line x1="180" y1="180" x2="350" y2="140"/>
    <line x1="350" y1="140" x2="520" y2="160"/>
    <line x1="520" y1="160" x2="680" y2="120"/>
    <line x1="680" y1="120" x2="750" y2="100"/>
    <line x1="750" y1="100" x2="850" y2="150"/>
    <line x1="850" y1="150" x2="1000" y2="130"/>
    <line x1="1000" y1="130" x2="1150" y2="155"/>
    <line x1="1150" y1="155" x2="1320" y2="140"/>
    <!-- Cross connections -->
    <line x1="350" y1="140" x2="680" y2="120"/>
    <line x1="520" y1="160" x2="850" y2="150"/>
    <line x1="750" y1="100" x2="1000" y2="130"/>
    <line x1="680" y1="120" x2="1150" y2="155"/>
    <line x1="180" y1="180" x2="520" y2="160"/>
    <line x1="1000" y1="130" x2="1320" y2="140"/>
  </g>
  <!-- Data pulses on connections -->
  <g fill="#4D738A" opacity="0.6">
    <circle cx="265" cy="160" r="2"/>
    <circle cx="600" cy="140" r="2"/>
    <circle cx="800" cy="125" r="2"/>
    <circle cx="1075" cy="142" r="2"/>
    <circle cx="1235" cy="148" r="2"/>
  </g>
  <!-- Horizontal rule line -->
  <line x1="500" y1="310" x2="1000" y2="310" stroke="#4D738A" stroke-width="1" opacity="0.5"/>
  <!-- Text: Network Smarter. -->
  <text x="750" y="280" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="52" fill="#ffffff" letter-spacing="4">Network Smarter.</text>
  <!-- Tagline -->
  <text x="750" y="340" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="16" fill="#4D738A" letter-spacing="6" opacity="0.8">INTELLIGENT NETWORK INFRASTRUCTURE</text>
  <!-- Bottom gradient fade -->
  <rect x="0" y="370" width="1500" height="30" fill="url(#buildGrad)" opacity="0.3"/>
</svg>