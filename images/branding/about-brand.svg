<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="abBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <filter id="nodeShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#003865" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#abBg)"/>
  <!-- Central hub (core switch) -->
  <g transform="translate(400, 300)" filter="url(#nodeShadow)">
    <circle cx="0" cy="0" r="40" fill="#003865"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#4D738A" stroke-width="1" opacity="0.5"/>
    <text x="0" y="-5" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#ffffff" font-weight="500">CORE</text>
    <text x="0" y="8" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" fill="#4D738A">x950 Stack</text>
  </g>
  <!-- Distribution layer nodes -->
  <g filter="url(#nodeShadow)">
    <!-- Top distribution -->
    <g transform="translate(400, 130)">
      <circle cx="0" cy="0" r="28" fill="#4D738A"/>
      <text x="0" y="-3" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">DIST</text>
      <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffffff" opacity="0.7">x530</text>
    </g>
    <!-- Left distribution -->
    <g transform="translate(180, 260)">
      <circle cx="0" cy="0" r="28" fill="#4D738A"/>
      <text x="0" y="-3" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">DIST</text>
      <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffffff" opacity="0.7">x530</text>
    </g>
    <!-- Right distribution -->
    <g transform="translate(620, 260)">
      <circle cx="0" cy="0" r="28" fill="#4D738A"/>
      <text x="0" y="-3" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">DIST</text>
      <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffffff" opacity="0.7">x530</text>
    </g>
    <!-- Bottom distribution -->
    <g transform="translate(400, 470)">
      <circle cx="0" cy="0" r="28" fill="#4D738A"/>
      <text x="0" y="-3" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ffffff">DIST</text>
      <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#ffffff" opacity="0.7">x530</text>
    </g>
  </g>
  <!-- Backbone connections (core to distribution) -->
  <g stroke="#003865" stroke-width="2.5" opacity="0.3">
    <line x1="400" y1="260" x2="400" y2="158"/>
    <line x1="365" y1="275" x2="208" y2="260"/>
    <line x1="435" y1="275" x2="592" y2="260"/>
    <line x1="400" y1="340" x2="400" y2="442"/>
  </g>
  <!-- Edge nodes -->
  <g filter="url(#nodeShadow)">
    <!-- Building nodes (top) -->
    <g transform="translate(250, 60)">
      <rect x="-22" y="-18" width="44" height="36" rx="4" fill="#ffffff" stroke="#4D738A" stroke-width="1.5"/>
      <rect x="-14" y="-10" width="10" height="8" fill="#4D738A" opacity="0.2"/>
      <rect x="4" y="-10" width="10" height="8" fill="#4D738A" opacity="0.2"/>
      <rect x="-14" y="2" width="10" height="8" fill="#4D738A" opacity="0.2"/>
      <rect x="4" y="2" width="10" height="8" fill="#4D738A" opacity="0.2"/>
      <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#003865" opacity="0.7">Bldg A</text>
    </g>
    <g transform="translate(550, 60)">
      <rect x="-22" y="-18" width="44" height="36" rx="4" fill="#ffffff" stroke="#4D738A" stroke-width="1.5"/>
      <rect x="-14" y="-10" width="10" height="8" fill="#4D738A" opacity="0.2"/>
      <rect x="4" y="-10" width="10" height="8" fill="#4D738A" opacity="0.2"/>
      <rect x="-14" y="2" width="10" height="8" fill="#4D738A" opacity="0.2"/>
      <rect x="4" y="2" width="10" height="8" fill="#4D738A" opacity="0.2"/>
      <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#003865" opacity="0.7">Bldg B</text>
    </g>
    <!-- Wireless APs -->
    <g transform="translate(80, 160)">
      <circle cx="0" cy="0" r="16" fill="#ffffff" stroke="#4D738A" stroke-width="1.5"/>
      <!-- WiFi icon -->
      <path d="M-6,-3 C-6,-9 6,-9 6,-3" fill="none" stroke="#4D738A" stroke-width="1" stroke-linecap="round"/>
      <path d="M-3,0 C-3,-4 3,-4 3,0" fill="none" stroke="#4D738A" stroke-width="1" stroke-linecap="round"/>
      <circle cx="0" cy="3" r="1.5" fill="#4D738A"/>
      <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#003865" opacity="0.7">AP</text>
    </g>
    <g transform="translate(720, 160)">
      <circle cx="0" cy="0" r="16" fill="#ffffff" stroke="#4D738A" stroke-width="1.5"/>
      <path d="M-6,-3 C-6,-9 6,-9 6,-3" fill="none" stroke="#4D738A" stroke-width="1" stroke-linecap="round"/>
      <path d="M-3,0 C-3,-4 3,-4 3,0" fill="none" stroke="#4D738A" stroke-width="1" stroke-linecap="round"/>
      <circle cx="0" cy="3" r="1.5" fill="#4D738A"/>
      <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#003865" opacity="0.7">AP</text>
    </g>
    <!-- Edge switches -->
    <g transform="translate(80, 380)">
      <rect x="-20" y="-10" width="40" height="20" rx="3" fill="#ffffff" stroke="#4D738A" stroke-width="1.5"/>
      <rect x="-14" y="-4" width="5" height="4" fill="#4D738A" opacity="0.3"/>
      <rect x="-6" y="-4" width="5" height="4" fill="#4D738A" opacity="0.3"/>
      <rect x="2" y="-4" width="5" height="4" fill="#4D738A" opacity="0.3"/>
      <rect x="10" y="-4" width="5" height="4" fill="#4D738A" opacity="0.3"/>
      <text x="0" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#003865" opacity="0.7">GS980</text>
    </g>
    <g transform="translate(720, 380)">
      <rect x="-20" y="-10" width="40" height="20" rx="3" fill="#ffffff" stroke="#4D738A" stroke-width="1.5"/>
      <rect x="-14" y="-4" width="5" height="4" fill="#4D738A" opacity="0.3"/>
      <rect x="-6" y="-4" width="5" height="4" fill="#4D738A" opacity="0.3"/>
      <rect x="2" y="-4" width="5" height="4" fill="#4D738A" opacity="0.3"/>
      <rect x="10" y="-4" width="5" height="4" fill="#4D738A" opacity="0.3"/>
      <text x="0" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#003865" opacity="0.7">GS980</text>
    </g>
    <!-- Firewall node -->
    <g transform="translate(400, 540)">
      <path d="M0,-18 L20,-10 L20,6 C20,16 10,22 0,26 C-10,22 -20,16 -20,6 L-20,-10 Z" fill="#ffffff" stroke="#983222" stroke-width="1.5"/>
      <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#983222">FW</text>
      <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#003865" opacity="0.7">AR4050S</text>
    </g>
  </g>
  <!-- Edge connections -->
  <g stroke="#4D738A" stroke-width="1" opacity="0.25">
    <line x1="370" y1="110" x2="272" y2="70"/>
    <line x1="430" y1="110" x2="528" y2="70"/>
    <line x1="160" y1="245" x2="96" y2="170"/>
    <line x1="160" y1="275" x2="100" y2="380"/>
    <line x1="640" y1="245" x2="704" y2="170"/>
    <line x1="640" y1="275" x2="700" y2="380"/>
    <line x1="400" y1="498" x2="400" y2="522"/>
  </g>
  <!-- Management cloud -->
  <g transform="translate(680, 490)" opacity="0.6">
    <path d="M20,28 C6,28 -2,20 2,12 C6,4 18,0 26,6 C30,-2 44,-2 48,6 C56,3 64,12 60,20 C64,28 52,32 44,28 Z" fill="none" stroke="#4D738A" stroke-width="1.2"/>
    <text x="32" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4D738A">Vista Mgr</text>
  </g>
  <line x1="650" y1="285" x2="680" y2="490" stroke="#4D738A" stroke-width="0.8" opacity="0.15" stroke-dasharray="4,4"/>
</svg>