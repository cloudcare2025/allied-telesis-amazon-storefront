<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 300" width="1500" height="300">
  <defs>
    <linearGradient id="fwBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003865"/>
      <stop offset="100%" stop-color="#001a30"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#983222"/>
      <stop offset="100%" stop-color="#6b2218"/>
    </linearGradient>
    <filter id="fwGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1500" height="300" fill="url(#fwBg)"/>
  <!-- Binary data streams (background) -->
  <g font-family="'Courier New', monospace" font-size="10" fill="#4D738A" opacity="0.08">
    <text x="50" y="30">01001010 11010010 00110101 10101010 01110011 00101100 11001010 01010011</text>
    <text x="200" y="55">10110100 01010011 11001010 00110101 10101010 01001010 11010010 01110011</text>
    <text x="100" y="80">00110101 10101010 01001010 11010010 01110011 10110100 01010011 11001010</text>
    <text x="300" y="105">11010010 01110011 10110100 01010011 11001010 00110101 10101010 01001010</text>
    <text x="50" y="130">01010011 11001010 00110101 10101010 01001010 11010010 01110011 10110100</text>
    <text x="250" y="155">10101010 01001010 11010010 01110011 10110100 01010011 11001010 00110101</text>
    <text x="150" y="180">01110011 10110100 01010011 11001010 00110101 10101010 01001010 11010010</text>
    <text x="350" y="205">11001010 00110101 10101010 01001010 11010010 01110011 10110100 01010011</text>
  </g>
  <!-- Firewall barrier lines -->
  <g stroke="#983222" stroke-width="1" opacity="0.15">
    <line x1="750" y1="0" x2="750" y2="300"/>
    <line x1="748" y1="0" x2="748" y2="300"/>
    <line x1="752" y1="0" x2="752" y2="300"/>
  </g>
  <!-- Shield -->
  <g transform="translate(750, 130)" filter="url(#fwGlow)">
    <path d="M0,-70 L55,-45 L55,15 C55,50 30,70 0,85 C-30,70 -55,50 -55,15 L-55,-45 Z" fill="url(#shieldGrad)" opacity="0.9"/>
    <path d="M0,-60 L45,-38 L45,12 C45,42 25,58 0,72 C-25,58 -45,42 -45,12 L-45,-38 Z" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    <!-- Lock icon inside shield -->
    <g transform="translate(0, -5)">
      <rect x="-15" y="-5" width="30" height="25" rx="3" fill="#ffffff" opacity="0.25"/>
      <path d="M-8,-5 L-8,-15 C-8,-25 8,-25 8,-15 L8,-5" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>
      <circle cx="0" cy="8" r="4" fill="#ffffff" opacity="0.3"/>
      <rect x="-1.5" y="8" width="3" height="7" rx="1" fill="#ffffff" opacity="0.3"/>
    </g>
  </g>
  <!-- Packet inspection visualization (left side - incoming) -->
  <g opacity="0.4">
    <!-- Incoming packets -->
    <rect x="200" y="100" width="60" height="20" rx="2" fill="none" stroke="#4D738A" stroke-width="1"/>
    <rect x="205" y="104" width="15" height="4" rx="1" fill="#4D738A" opacity="0.5"/>
    <rect x="225" y="104" width="30" height="4" rx="1" fill="#4D738A" opacity="0.3"/>
    <rect x="205" y="112" width="50" height="4" rx="1" fill="#4D738A" opacity="0.2"/>

    <rect x="300" y="130" width="60" height="20" rx="2" fill="none" stroke="#4D738A" stroke-width="1"/>
    <rect x="305" y="134" width="15" height="4" rx="1" fill="#4D738A" opacity="0.5"/>
    <rect x="325" y="134" width="30" height="4" rx="1" fill="#4D738A" opacity="0.3"/>

    <rect x="250" y="160" width="60" height="20" rx="2" fill="none" stroke="#983222" stroke-width="1" opacity="0.8"/>
    <rect x="255" y="164" width="15" height="4" rx="1" fill="#983222" opacity="0.5"/>
    <rect x="275" y="164" width="30" height="4" rx="1" fill="#983222" opacity="0.3"/>
    <!-- X on blocked packet -->
    <line x1="248" y1="158" x2="312" y2="182" stroke="#983222" stroke-width="1.5" opacity="0.6"/>
    <line x1="312" y1="158" x2="248" y2="182" stroke="#983222" stroke-width="1.5" opacity="0.6"/>

    <rect x="350" y="80" width="60" height="20" rx="2" fill="none" stroke="#4D738A" stroke-width="1"/>
    <rect x="355" y="84" width="15" height="4" rx="1" fill="#4D738A" opacity="0.5"/>
  </g>
  <!-- Arrows showing packet flow -->
  <g stroke="#4D738A" stroke-width="1" opacity="0.3" fill="none" marker-end="url(#arrow)">
    <line x1="265" y1="110" x2="680" y2="125"/>
    <line x1="365" y1="140" x2="680" y2="135"/>
    <line x1="415" y1="90" x2="680" y2="120"/>
  </g>
  <!-- Outgoing (right side - clean traffic) -->
  <g opacity="0.4">
    <rect x="1200" y="105" width="60" height="20" rx="2" fill="none" stroke="#2ecc71" stroke-width="1"/>
    <rect x="1205" y="109" width="15" height="4" rx="1" fill="#2ecc71" opacity="0.5"/>
    <rect x="1225" y="109" width="30" height="4" rx="1" fill="#2ecc71" opacity="0.3"/>
    <rect x="1205" y="117" width="50" height="4" rx="1" fill="#2ecc71" opacity="0.2"/>

    <rect x="1120" y="135" width="60" height="20" rx="2" fill="none" stroke="#2ecc71" stroke-width="1"/>
    <rect x="1125" y="139" width="15" height="4" rx="1" fill="#2ecc71" opacity="0.5"/>

    <rect x="1150" y="85" width="60" height="20" rx="2" fill="none" stroke="#2ecc71" stroke-width="1"/>
    <rect x="1155" y="89" width="15" height="4" rx="1" fill="#2ecc71" opacity="0.5"/>
  </g>
  <!-- Flow arrows right side -->
  <g stroke="#2ecc71" stroke-width="1" opacity="0.2" fill="none">
    <line x1="820" y1="125" x2="1195" y2="115"/>
    <line x1="820" y1="135" x2="1115" y2="145"/>
    <line x1="820" y1="120" x2="1145" y2="95"/>
  </g>
  <!-- Title -->
  <text x="750" y="260" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="22" fill="#ffffff" letter-spacing="6" opacity="0.9">NEXT-GEN FIREWALLS</text>
</svg>