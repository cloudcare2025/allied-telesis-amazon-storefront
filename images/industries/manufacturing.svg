<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="mfgBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef1f5"/>
      <stop offset="100%" stop-color="#d8dfe8"/>
    </linearGradient>
    <filter id="mfgShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#003865" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#mfgBg)"/>
  <!-- Factory building -->
  <g transform="translate(20, 60)" filter="url(#mfgShadow)">
    <!-- Main structure -->
    <rect x="0" y="60" width="160" height="110" fill="#ffffff" stroke="#4D738A" stroke-width="1.5" rx="1"/>
    <!-- Sawtooth roof -->
    <polygon points="0,60 40,25 80,60 120,25 160,60" fill="#ffffff" stroke="#4D738A" stroke-width="1.5"/>
    <!-- Chimney -->
    <rect x="140" y="10" width="15" height="50" fill="#ffffff" stroke="#4D738A" stroke-width="1.2"/>
    <!-- Smoke -->
    <g fill="none" stroke="#4D738A" stroke-width="0.8" opacity="0.15">
      <path d="M147,10 C144,0 150,-5 147,-12"/>
      <path d="M152,10 C155,2 149,-3 152,-10"/>
    </g>
    <!-- Windows -->
    <g fill="#e8eef4" stroke="#4D738A" stroke-width="0.6">
      <rect x="10" y="80" width="18" height="12" rx="1"/>
      <rect x="38" y="80" width="18" height="12" rx="1"/>
      <rect x="66" y="80" width="18" height="12" rx="1"/>
      <rect x="100" y="80" width="18" height="12" rx="1"/>
      <rect x="130" y="80" width="18" height="12" rx="1"/>
    </g>
    <!-- Loading door -->
    <rect x="40" y="130" width="50" height="40" fill="#e8eef4" stroke="#4D738A" stroke-width="1"/>
    <g stroke="#4D738A" stroke-width="0.5" opacity="0.3">
      <line x1="40" y1="140" x2="90" y2="140"/>
      <line x1="40" y1="150" x2="90" y2="150"/>
      <line x1="40" y1="160" x2="90" y2="160"/>
    </g>
  </g>
  <!-- Conveyor belt -->
  <g transform="translate(200, 160)">
    <rect x="0" y="0" width="180" height="8" rx="4" fill="none" stroke="#4D738A" stroke-width="1.5" opacity="0.5"/>
    <!-- Rollers -->
    <circle cx="10" cy="4" r="4" fill="none" stroke="#4D738A" stroke-width="1" opacity="0.3"/>
    <circle cx="50" cy="4" r="4" fill="none" stroke="#4D738A" stroke-width="1" opacity="0.3"/>
    <circle cx="90" cy="4" r="4" fill="none" stroke="#4D738A" stroke-width="1" opacity="0.3"/>
    <circle cx="130" cy="4" r="4" fill="none" stroke="#4D738A" stroke-width="1" opacity="0.3"/>
    <circle cx="170" cy="4" r="4" fill="none" stroke="#4D738A" stroke-width="1" opacity="0.3"/>
    <!-- Items on belt -->
    <rect x="25" y="-12" width="16" height="12" rx="1" fill="#ffffff" stroke="#4D738A" stroke-width="1" opacity="0.6"/>
    <rect x="65" y="-12" width="16" height="12" rx="1" fill="#ffffff" stroke="#4D738A" stroke-width="1" opacity="0.6"/>
    <rect x="105" y="-12" width="16" height="12" rx="1" fill="#ffffff" stroke="#4D738A" stroke-width="1" opacity="0.6"/>
    <rect x="145" y="-12" width="16" height="12" rx="1" fill="#ffffff" stroke="#4D738A" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Robot arm -->
  <g transform="translate(310, 100)">
    <rect x="-5" y="60" width="10" height="8" fill="#4D738A" opacity="0.4"/>
    <line x1="0" y1="60" x2="0" y2="35" stroke="#4D738A" stroke-width="3" opacity="0.5"/>
    <line x1="0" y1="35" x2="-25" y2="10" stroke="#4D738A" stroke-width="2.5" opacity="0.5"/>
    <line x1="-25" y1="10" x2="-35" y2="30" stroke="#4D738A" stroke-width="2" opacity="0.5"/>
    <!-- Gripper -->
    <line x1="-38" y1="28" x2="-32" y2="38" stroke="#4D738A" stroke-width="1.5" opacity="0.5"/>
    <line x1="-32" y1="28" x2="-38" y2="38" stroke="#4D738A" stroke-width="1.5" opacity="0.5"/>
    <!-- Joint circles -->
    <circle cx="0" cy="35" r="3" fill="#ffffff" stroke="#4D738A" stroke-width="1"/>
    <circle cx="-25" cy="10" r="3" fill="#ffffff" stroke="#4D738A" stroke-width="1"/>
  </g>
  <!-- IIoT sensors -->
  <g fill="#4D738A" opacity="0.4">
    <circle cx="230" cy="130" r="4"/>
    <circle cx="270" cy="130" r="4"/>
    <circle cx="350" cy="130" r="4"/>
  </g>
  <!-- Sensor data lines -->
  <g stroke="#4D738A" stroke-width="0.6" opacity="0.15" stroke-dasharray="3,3">
    <line x1="230" y1="126" x2="230" y2="90"/>
    <line x1="270" y1="126" x2="270" y2="90"/>
    <line x1="350" y1="126" x2="350" y2="90"/>
    <line x1="230" y1="90" x2="350" y2="90"/>
  </g>
  <!-- Industrial switch -->
  <g transform="translate(275, 75)">
    <rect x="0" y="0" width="20" height="30" rx="2" fill="#ffffff" stroke="#4D738A" stroke-width="1" opacity="0.6"/>
    <rect x="3" y="4" width="5" height="3" fill="#4D738A" opacity="0.3"/>
    <rect x="3" y="10" width="5" height="3" fill="#4D738A" opacity="0.3"/>
    <rect x="3" y="16" width="5" height="3" fill="#4D738A" opacity="0.3"/>
    <circle cx="15" cy="6" r="1.5" fill="#2ecc71" opacity="0.5"/>
    <circle cx="15" cy="12" r="1.5" fill="#2ecc71" opacity="0.4"/>
  </g>
  <!-- Gears (decorative) -->
  <g transform="translate(60, 240)" fill="none" stroke="#4D738A" stroke-width="1.2" opacity="0.15">
    <circle cx="0" cy="0" r="15"/>
    <circle cx="0" cy="0" r="6"/>
    <line x1="0" y1="-15" x2="0" y2="-6"/><line x1="0" y1="6" x2="0" y2="15"/>
    <line x1="-15" y1="0" x2="-6" y2="0"/><line x1="6" y1="0" x2="15" y2="0"/>
    <line x1="-10.6" y1="-10.6" x2="-4.2" y2="-4.2"/><line x1="4.2" y1="4.2" x2="10.6" y2="10.6"/>
    <line x1="10.6" y1="-10.6" x2="4.2" y2="-4.2"/><line x1="-4.2" y1="4.2" x2="-10.6" y2="10.6"/>
  </g>
  <g transform="translate(85, 225)" fill="none" stroke="#4D738A" stroke-width="1" opacity="0.1">
    <circle cx="0" cy="0" r="10"/>
    <circle cx="0" cy="0" r="4"/>
  </g>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400" font-size="14" fill="#003865" letter-spacing="3">MANUFACTURING</text>
</svg>