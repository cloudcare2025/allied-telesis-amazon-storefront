<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 300" width="1500" height="300">
  <defs>
    <linearGradient id="wirelessBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003865"/>
      <stop offset="50%" stop-color="#1a4f7a"/>
      <stop offset="100%" stop-color="#4D738A"/>
    </linearGradient>
    <filter id="wGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1500" height="300" fill="url(#wirelessBg)"/>
  <!-- Central AP -->
  <g transform="translate(750, 140)">
    <!-- AP body -->
    <ellipse cx="0" cy="0" rx="45" ry="12" fill="#2a4560" stroke="#4D738A" stroke-width="1.5"/>
    <ellipse cx="0" cy="-4" rx="40" ry="10" fill="#1a3550"/>
    <circle cx="0" cy="-4" r="4" fill="#4D738A" opacity="0.6"/>
    <!-- Signal waves -->
    <g fill="none" stroke="#4D738A" stroke-width="1.5" opacity="0.15">
      <ellipse cx="0" cy="-10" rx="70" ry="35"/>
    </g>
    <g fill="none" stroke="#4D738A" stroke-width="1.5" opacity="0.2">
      <ellipse cx="0" cy="-10" rx="110" ry="55"/>
    </g>
    <g fill="none" stroke="#4D738A" stroke-width="1.5" opacity="0.25">
      <ellipse cx="0" cy="-10" rx="150" ry="75"/>
    </g>
    <g fill="none" stroke="#4D738A" stroke-width="1.5" opacity="0.15">
      <ellipse cx="0" cy="-10" rx="200" ry="100"/>
    </g>
    <g fill="none" stroke="#4D738A" stroke-width="1" opacity="0.1">
      <ellipse cx="0" cy="-10" rx="260" ry="130"/>
    </g>
  </g>
  <!-- Left AP -->
  <g transform="translate(300, 130)">
    <ellipse cx="0" cy="0" rx="35" ry="9" fill="#2a4560" stroke="#4D738A" stroke-width="1" opacity="0.7"/>
    <circle cx="0" cy="-3" r="3" fill="#4D738A" opacity="0.5"/>
    <g fill="none" stroke="#4D738A" stroke-width="1" opacity="0.12">
      <ellipse cx="0" cy="-8" rx="55" ry="28"/>
    </g>
    <g fill="none" stroke="#4D738A" stroke-width="1" opacity="0.08">
      <ellipse cx="0" cy="-8" rx="90" ry="45"/>
    </g>
  </g>
  <!-- Right AP -->
  <g transform="translate(1200, 130)">
    <ellipse cx="0" cy="0" rx="35" ry="9" fill="#2a4560" stroke="#4D738A" stroke-width="1" opacity="0.7"/>
    <circle cx="0" cy="-3" r="3" fill="#4D738A" opacity="0.5"/>
    <g fill="none" stroke="#4D738A" stroke-width="1" opacity="0.12">
      <ellipse cx="0" cy="-8" rx="55" ry="28"/>
    </g>
    <g fill="none" stroke="#4D738A" stroke-width="1" opacity="0.08">
      <ellipse cx="0" cy="-8" rx="90" ry="45"/>
    </g>
  </g>
  <!-- Connected devices -->
  <g filter="url(#wGlow)">
    <!-- Laptop icons -->
    <g transform="translate(550, 90)" fill="#4D738A" opacity="0.6">
      <rect x="0" y="0" width="20" height="14" rx="2" fill="none" stroke="#4D738A" stroke-width="1.2"/>
      <line x1="-3" y1="16" x2="23" y2="16" stroke="#4D738A" stroke-width="1.2"/>
    </g>
    <g transform="translate(920, 85)" fill="#4D738A" opacity="0.6">
      <rect x="0" y="0" width="20" height="14" rx="2" fill="none" stroke="#4D738A" stroke-width="1.2"/>
      <line x1="-3" y1="16" x2="23" y2="16" stroke="#4D738A" stroke-width="1.2"/>
    </g>
    <!-- Phone icons -->
    <g transform="translate(640, 55)" fill="#4D738A" opacity="0.5">
      <rect x="0" y="0" width="10" height="18" rx="2" fill="none" stroke="#4D738A" stroke-width="1"/>
      <line x1="3" y1="15" x2="7" y2="15" stroke="#4D738A" stroke-width="0.8"/>
    </g>
    <g transform="translate(850, 60)" fill="#4D738A" opacity="0.5">
      <rect x="0" y="0" width="10" height="18" rx="2" fill="none" stroke="#4D738A" stroke-width="1"/>
      <line x1="3" y1="15" x2="7" y2="15" stroke="#4D738A" stroke-width="0.8"/>
    </g>
    <!-- Tablet -->
    <g transform="translate(430, 70)" fill="#4D738A" opacity="0.5">
      <rect x="0" y="0" width="16" height="22" rx="2" fill="none" stroke="#4D738A" stroke-width="1"/>
      <circle cx="8" cy="19" r="1.5" fill="none" stroke="#4D738A" stroke-width="0.8"/>
    </g>
    <g transform="translate(1050, 75)" fill="#4D738A" opacity="0.5">
      <rect x="0" y="0" width="16" height="22" rx="2" fill="none" stroke="#4D738A" stroke-width="1"/>
      <circle cx="8" cy="19" r="1.5" fill="none" stroke="#4D738A" stroke-width="0.8"/>
    </g>
  </g>
  <!-- Connection lines from devices to APs -->
  <g stroke="#4D738A" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,4">
    <line x1="560" y1="97" x2="750" y2="136"/>
    <line x1="930" y1="92" x2="750" y2="136"/>
    <line x1="645" y1="64" x2="750" y2="136"/>
    <line x1="855" y1="69" x2="750" y2="136"/>
    <line x1="438" y1="81" x2="300" y2="127"/>
    <line x1="1058" y1="86" x2="1200" y2="127"/>
  </g>
  <!-- WiFi symbol at top center -->
  <g transform="translate(750, 30)" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3">
    <path d="M-30,0 C-30,-20 30,-20 30,0" stroke-linecap="round"/>
    <path d="M-20,5 C-20,-10 20,-10 20,5" stroke-linecap="round"/>
    <path d="M-10,10 C-10,0 10,0 10,10" stroke-linecap="round"/>
    <circle cx="0" cy="15" r="3" fill="#ffffff"/>
  </g>
  <!-- Title -->
  <text x="750" y="255" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="22" fill="#ffffff" letter-spacing="6" opacity="0.9">WIRELESS NETWORKING</text>
</svg>