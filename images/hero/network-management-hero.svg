<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 300" width="1500" height="300">
  <defs>
    <linearGradient id="nmBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003865"/>
      <stop offset="100%" stop-color="#4D738A"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#0d1b28"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="300" fill="url(#nmBg)"/>
  <!-- Main monitor -->
  <g transform="translate(600, 25)">
    <!-- Monitor frame -->
    <rect x="0" y="0" width="300" height="185" rx="6" fill="#1a2a3a" stroke="#2a4560" stroke-width="2"/>
    <!-- Screen -->
    <rect x="8" y="8" width="284" height="155" rx="3" fill="url(#screenGrad)"/>
    <!-- Dashboard content -->
    <!-- Top bar -->
    <rect x="12" y="12" width="276" height="20" rx="2" fill="#152535"/>
    <circle cx="24" cy="22" r="4" fill="#983222" opacity="0.6"/>
    <circle cx="36" cy="22" r="4" fill="#f39c12" opacity="0.5"/>
    <circle cx="48" cy="22" r="4" fill="#2ecc71" opacity="0.5"/>
    <text x="150" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4D738A" opacity="0.7">Vista Manager EX</text>
    <!-- Network topology area -->
    <rect x="12" y="36" width="160" height="90" rx="2" fill="#0a1520"/>
    <!-- Topology nodes -->
    <circle cx="50" cy="55" r="6" fill="#4D738A" opacity="0.6"/>
    <circle cx="100" cy="50" r="8" fill="#4D738A" opacity="0.7"/>
    <circle cx="140" cy="60" r="5" fill="#4D738A" opacity="0.5"/>
    <circle cx="70" cy="85" r="5" fill="#2ecc71" opacity="0.6"/>
    <circle cx="120" cy="90" r="6" fill="#2ecc71" opacity="0.5"/>
    <circle cx="50" cy="105" r="4" fill="#4D738A" opacity="0.4"/>
    <circle cx="100" cy="110" r="5" fill="#f39c12" opacity="0.5"/>
    <circle cx="145" cy="100" r="4" fill="#4D738A" opacity="0.4"/>
    <!-- Topology connections -->
    <g stroke="#4D738A" stroke-width="0.5" opacity="0.3">
      <line x1="50" y1="55" x2="100" y2="50"/>
      <line x1="100" y1="50" x2="140" y2="60"/>
      <line x1="50" y1="55" x2="70" y2="85"/>
      <line x1="100" y1="50" x2="120" y2="90"/>
      <line x1="100" y1="50" x2="70" y2="85"/>
      <line x1="140" y1="60" x2="145" y2="100"/>
      <line x1="70" y1="85" x2="100" y2="110"/>
      <line x1="120" y1="90" x2="100" y2="110"/>
      <line x1="50" y1="105" x2="70" y2="85"/>
      <line x1="145" y1="100" x2="120" y2="90"/>
    </g>
    <!-- Graphs panel -->
    <rect x="178" y="36" width="110" height="42" rx="2" fill="#0a1520"/>
    <!-- Bar chart -->
    <rect x="185" y="60" width="8" height="14" fill="#4D738A" opacity="0.6"/>
    <rect x="197" y="52" width="8" height="22" fill="#4D738A" opacity="0.7"/>
    <rect x="209" y="56" width="8" height="18" fill="#4D738A" opacity="0.5"/>
    <rect x="221" y="48" width="8" height="26" fill="#2ecc71" opacity="0.6"/>
    <rect x="233" y="54" width="8" height="20" fill="#4D738A" opacity="0.6"/>
    <rect x="245" y="50" width="8" height="24" fill="#4D738A" opacity="0.5"/>
    <rect x="257" y="58" width="8" height="16" fill="#4D738A" opacity="0.4"/>
    <text x="233" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#4D738A" opacity="0.5">Throughput</text>
    <!-- Line chart -->
    <rect x="178" y="82" width="110" height="44" rx="2" fill="#0a1520"/>
    <polyline points="185,110 195,105 205,108 215,98 225,102 235,95 245,100 255,92 265,96 275,88 282,90" fill="none" stroke="#2ecc71" stroke-width="1.2" opacity="0.6"/>
    <polyline points="185,115 195,112 205,118 215,110 225,114 235,108 245,112 255,106 265,108 275,104 282,106" fill="none" stroke="#4D738A" stroke-width="1" opacity="0.4"/>
    <text x="233" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#4D738A" opacity="0.5">Latency</text>
    <!-- Status row -->
    <rect x="12" y="130" width="276" height="28" rx="2" fill="#0a1520"/>
    <circle cx="30" cy="144" r="5" fill="#2ecc71" opacity="0.6"/>
    <text x="42" y="147" font-family="Arial, sans-serif" font-size="7" fill="#2ecc71" opacity="0.6">42 Online</text>
    <circle cx="110" cy="144" r="5" fill="#f39c12" opacity="0.6"/>
    <text x="122" y="147" font-family="Arial, sans-serif" font-size="7" fill="#f39c12" opacity="0.6">3 Warning</text>
    <circle cx="195" cy="144" r="5" fill="#983222" opacity="0.6"/>
    <text x="207" y="147" font-family="Arial, sans-serif" font-size="7" fill="#983222" opacity="0.6">0 Critical</text>
    <!-- Monitor stand -->
    <rect x="130" y="185" width="40" height="8" fill="#1a2a3a"/>
    <rect x="115" y="193" width="70" height="5" rx="2" fill="#1a2a3a"/>
  </g>
  <!-- Cloud icon -->
  <g transform="translate(740, 5)" opacity="0.3">
    <path d="M30,35 C10,35 0,25 5,15 C10,5 25,0 35,8 C40,-2 60,-2 65,8 C75,5 85,15 80,25 C85,35 70,40 60,35 Z" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  </g>
  <!-- Left side panel -->
  <g transform="translate(200, 60)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="#1a2a3a" stroke="#2a4560" stroke-width="1" opacity="0.7"/>
    <rect x="6" y="6" width="108" height="55" rx="2" fill="#0a1520" opacity="0.8"/>
    <!-- Mini chart -->
    <polyline points="12,48 22,40 32,44 42,35 52,38 62,30 72,34 82,25 92,28 102,22" fill="none" stroke="#4D738A" stroke-width="1" opacity="0.5"/>
    <text x="60" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4D738A" opacity="0.5">AWC Plugin</text>
  </g>
  <!-- Right side panel -->
  <g transform="translate(1180, 60)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="#1a2a3a" stroke="#2a4560" stroke-width="1" opacity="0.7"/>
    <rect x="6" y="6" width="108" height="55" rx="2" fill="#0a1520" opacity="0.8"/>
    <!-- Mini pie chart -->
    <circle cx="60" cy="33" r="18" fill="none" stroke="#4D738A" stroke-width="1" opacity="0.3"/>
    <path d="M60,33 L60,15 A18,18 0 0,1 76,42 Z" fill="#2ecc71" opacity="0.4"/>
    <path d="M60,33 L76,42 A18,18 0 0,1 42,42 Z" fill="#4D738A" opacity="0.4"/>
    <path d="M60,33 L42,42 A18,18 0 0,1 60,15 Z" fill="#f39c12" opacity="0.3"/>
    <text x="60" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#4D738A" opacity="0.5">SNMP Plugin</text>
  </g>
  <!-- Connection lines from panels to main monitor -->
  <g stroke="#4D738A" stroke-width="0.8" opacity="0.2" stroke-dasharray="6,4">
    <line x1="320" y1="100" x2="600" y2="120"/>
    <line x1="1180" y1="100" x2="900" y2="120"/>
  </g>
  <!-- Title -->
  <text x="750" y="270" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="22" fill="#ffffff" letter-spacing="6" opacity="0.9">NETWORK MANAGEMENT</text>
</svg>