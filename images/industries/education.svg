<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="eduBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#dce4ec"/>
    </linearGradient>
    <filter id="eduShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#003865" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#eduBg)"/>
  <!-- Campus building -->
  <g transform="translate(120, 80)" filter="url(#eduShadow)">
    <!-- Main building body -->
    <rect x="0" y="40" width="160" height="100" fill="#ffffff" stroke="#4D738A" stroke-width="1.5" rx="2"/>
    <!-- Entrance -->
    <rect x="60" y="100" width="40" height="40" fill="#e8eef4" stroke="#4D738A" stroke-width="1"/>
    <!-- Pediment/roof detail -->
    <polygon points="0,40 80,10 160,40" fill="#ffffff" stroke="#4D738A" stroke-width="1.5"/>
    <!-- Columns -->
    <line x1="30" y1="40" x2="30" y2="140" stroke="#4D738A" stroke-width="2" opacity="0.3"/>
    <line x1="60" y1="40" x2="60" y2="100" stroke="#4D738A" stroke-width="2" opacity="0.3"/>
    <line x1="100" y1="40" x2="100" y2="100" stroke="#4D738A" stroke-width="2" opacity="0.3"/>
    <line x1="130" y1="40" x2="130" y2="140" stroke="#4D738A" stroke-width="2" opacity="0.3"/>
    <!-- Windows -->
    <g fill="#e8eef4" stroke="#4D738A" stroke-width="0.8">
      <rect x="12" y="55" width="16" height="14" rx="1"/>
      <rect x="40" y="55" width="16" height="14" rx="1"/>
      <rect x="104" y="55" width="16" height="14" rx="1"/>
      <rect x="132" y="55" width="16" height="14" rx="1"/>
      <rect x="12" y="80" width="16" height="14" rx="1"/>
      <rect x="40" y="80" width="16" height="14" rx="1"/>
      <rect x="104" y="80" width="16" height="14" rx="1"/>
      <rect x="132" y="80" width="16" height="14" rx="1"/>
    </g>
  </g>
  <!-- WiFi signals from building -->
  <g fill="none" stroke="#4D738A" stroke-width="1.2" opacity="0.25">
    <path d="M180,85 C180,75 200,75 200,85" stroke-linecap="round"/>
    <path d="M175,80 C175,65 205,65 205,80" stroke-linecap="round"/>
    <path d="M170,75 C170,55 210,55 210,75" stroke-linecap="round"/>
  </g>
  <!-- Student with device (left) -->
  <g transform="translate(60, 200)">
    <!-- Person -->
    <circle cx="0" cy="-15" r="8" fill="none" stroke="#4D738A" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="15" stroke="#4D738A" stroke-width="1.5"/>
    <line x1="-10" y1="2" x2="10" y2="2" stroke="#4D738A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="15" x2="-8" y2="30" stroke="#4D738A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="15" x2="8" y2="30" stroke="#4D738A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Laptop -->
    <rect x="12" y="-2" width="16" height="10" rx="1" fill="none" stroke="#4D738A" stroke-width="1"/>
    <line x1="10" y1="10" x2="30" y2="10" stroke="#4D738A" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- Student with device (right) -->
  <g transform="translate(340, 195)">
    <circle cx="0" cy="-15" r="8" fill="none" stroke="#4D738A" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="15" stroke="#4D738A" stroke-width="1.5"/>
    <line x1="-10" y1="2" x2="10" y2="2" stroke="#4D738A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="15" x2="-8" y2="30" stroke="#4D738A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="15" x2="8" y2="30" stroke="#4D738A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Tablet -->
    <rect x="-22" y="-4" width="12" height="16" rx="1.5" fill="none" stroke="#4D738A" stroke-width="1"/>
  </g>
  <!-- Network nodes connecting students to building -->
  <g stroke="#4D738A" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,3">
    <line x1="80" y1="198" x2="160" y2="160"/>
    <line x1="320" y1="193" x2="260" y2="160"/>
  </g>
  <!-- Small wireless indicators near students -->
  <g fill="none" stroke="#4D738A" stroke-width="0.8" opacity="0.3">
    <path d="M86,192 C86,188 94,188 94,192"/>
    <path d="M84,189 C84,183 96,183 96,189"/>
    <path d="M314,187 C314,183 322,183 322,187"/>
    <path d="M312,184 C312,178 324,178 324,184"/>
  </g>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400" font-size="14" fill="#003865" letter-spacing="3">EDUCATION</text>
</svg>